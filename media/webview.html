<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- CSP_PLACEHOLDER -->

  <title>AutoGen Control Panel</title>
</head>
<body>
  <div id="app" class="webview-shell app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">A</div>
        <div class="brand-copy">
          <h1 data-i18n="app.title">AutoGen Code</h1>
          <p data-i18n="app.subtitle">Run control placeholder</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="mini-btn" type="button" data-i18n-toggle data-i18n="language.toggle">中文</button>
        <span class="status-pill" data-i18n="app.badge">Task 2G</span>
      </div>
    </header>

    <div id="webview-status" class="webview-status" data-i18n="status.htmlLoaded">Webview HTML loaded</div>

    <nav class="tabs" aria-label="AutoGen sections">
      <button class="tab active" type="button" data-tab="run" data-i18n="tabs.run">Run</button>
      <button class="tab" type="button" data-tab="agents" data-i18n="tabs.agents">Agents</button>
      <button class="tab" type="button" data-tab="team" data-i18n="tabs.team">Team</button>
      <button class="tab" type="button" data-tab="tools" data-i18n="tabs.tools">Tools</button>
      <button class="tab" type="button" data-tab="workflow" data-i18n="tabs.workflow">Workflow</button>
      <button class="tab" type="button" data-tab="settings" data-i18n="tabs.settings">Settings</button>
    </nav>

    <main class="content">

      <!-- PANEL_AGENTS -->

      <!-- PANEL_TEAM -->

      <!-- PANEL_TOOLS -->

      <!-- PANEL_WORKFLOW -->

    </main>
  </div>

</body>
</html>
